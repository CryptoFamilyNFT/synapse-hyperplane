[build]
# Optimize for native CPU
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native"]

[alias]
# Convenience aliases
test-all = "test --workspace"
build-release = "build --release --workspace"
bench = "bench --workspace"
