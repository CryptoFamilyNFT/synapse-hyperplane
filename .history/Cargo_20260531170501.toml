[workspace]
members = [
    "crates/hyperplane-types",
    "crates/account-file-mapper",
    "crates/base-locator",
    "crates/geyser-bridge",
    "crates/delta-plane",
    "crates/index-fabric",
    "crates/query-orchestrator",
    "crates/rpc-read-provider",
    "crates/cache-plane",
    "crates/slot-reconciler",
    "crates/control-plane",
    "crates/synapse-hyperplane",
    "crates/synapse-hyper-cli",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"

# Feature flags per backend storage
# - default: redb (sviluppo macOS, nessun C++)
# - rocksdb: produzione Linux/Ubuntu (performance migliori)
[workspace.features]
default = ["redb-backend"]
redb-backend = []
rocksdb-backend = []

[workspace.dependencies]
# Internal crates
hyperplane-types = { path = "crates/hyperplane-types" }
account-file-mapper = { path = "crates/account-file-mapper" }
base-locator = { path = "crates/base-locator" }
geyser-bridge = { path = "crates/geyser-bridge" }
delta-plane = { path = "crates/delta-plane" }
index-fabric = { path = "crates/index-fabric" }
query-orchestrator = { path = "crates/query-orchestrator" }
rpc-read-provider = { path = "crates/rpc-read-provider" }
cache-plane = { path = "crates/cache-plane" }
slot-reconciler = { path = "crates/slot-reconciler" }
control-plane = { path = "crates/control-plane" }

# Solana/Agave
solana-sdk = "2.1.0"
solana-account-decoder = "2.1.0"
solana-rpc-client-api = "2.1.0"
agave-geyser-plugin-interface = "4.0.0"

# Common crates
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
base64 = "0.21"
bincode = "1.3"
parking_lot = "0.12"

# Async runtime
tokio = { version = "1.43", features = ["full"] }
tokio-util = "0.7"
async-trait = "0.1"

# Database backends - redb only (rocksdb is crate-specific optional)
redb = "2.4"
rocksdb = "0.23"
postgres = "0.19"

# Compression & indexes
roaring = "0.10"

# Memory mapping
memmap2 = "0.9"

# Logging & metrics
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
metrics = "0.24"
metrics-exporter-prometheus = "0.16"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Utilities
bytes = "1.9"
dashmap = "6.1"
once_cell = "1.20"
byteorder = "1.5"

# Cryptography
sha2 = "0.10"
blake3 = "1.5"

# Network
hyper = { version = "1.5", features = ["full"] }
hyper-util = { version = "0.1", features = ["full"] }
http-body-util = "0.1"

# Testing
criterion = "0.5"
tempfile = "3.15"
rayon = "1.10"

# Redis
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }

# CLI
clap = { version = "4.5", features = ["derive"] }
toml = "0.8"

# CPU detection
num_cpus = "1.16"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
target-cpu = "native"

[profile.dev]
opt-level = 1
